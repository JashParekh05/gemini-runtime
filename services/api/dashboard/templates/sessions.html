{% extends "base.html" %}
{% block title %}Sessions — gemini-runtime{% endblock %}
{% block content %}
<h1>Sessions</h1>

<div id="slo-strip" class="grid4" style="margin-bottom:20px"></div>

<div class="card">
  <h2>Recent runs</h2>
  <table>
    <thead>
      <tr>
        <th>Session ID</th>
        <th>Status</th>
        <th>Task</th>
        <th>Tokens</th>
        <th>Cost</th>
        <th>Latency</th>
        <th>Started</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="sessions-tbody">
      <tr><td colspan="8" style="color:#8b949e;text-align:center;padding:24px">Loading…</td></tr>
    </tbody>
  </table>
</div>

<div class="card" style="max-width:480px">
  <h2>Run a new task</h2>
  <form id="new-session-form" style="display:flex;gap:8px;margin-top:8px">
    <input type="text" id="task-input" placeholder="Describe the task…"
      style="flex:1;background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:8px 12px;border-radius:6px;font-family:inherit;font-size:13px">
    <button type="submit"
      style="background:#1f6feb;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px">
      Submit
    </button>
  </form>
  <div id="submit-status" style="margin-top:8px;font-size:12px;color:#8b949e"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const statusBadge = (s) => {
  const map = {completed:'green',failed:'red',planning:'yellow',executing:'yellow',verifying:'yellow',pending:'gray'};
  return `<span class="badge badge-${map[s]||'gray'}">${s}</span>`;
};

async function loadSessions() {
  const r = await fetch('/api/v1/sessions?limit=30');
  const sessions = await r.json();
  const tbody = document.getElementById('sessions-tbody');
  if (!sessions.length) { tbody.innerHTML = '<tr><td colspan="8" style="color:#8b949e;text-align:center;padding:24px">No sessions yet</td></tr>'; return; }
  tbody.innerHTML = sessions.map(s => `
    <tr>
      <td><a href="/sessions/${s.session_id}" class="mono">${s.session_id.slice(0,8)}…</a></td>
      <td>${statusBadge(s.status)}</td>
      <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.task_description||''}</td>
      <td>${(s.total_tokens||0).toLocaleString()}</td>
      <td>$${(s.total_cost_usd||0).toFixed(5)}</td>
      <td>${s.total_latency_ms ? (s.total_latency_ms/1000).toFixed(1)+'s' : '—'}</td>
      <td class="mono">${s.created_at ? new Date(s.created_at).toLocaleString() : '—'}</td>
      <td><a href="/sessions/${s.session_id}/replay">replay</a></td>
    </tr>
  `).join('');
}

async function loadSLOs() {
  try {
    const r = await fetch('/api/v1/analytics/slo');
    const slos = await r.json();
    const strip = document.getElementById('slo-strip');
    strip.innerHTML = Object.values(slos).map(s => `
      <div class="card" style="margin:0">
        <div class="stat-value" style="font-size:22px;color:${s.status==='healthy'?'#3fb950':s.status==='at_risk'?'#e3b341':'#f85149'}">
          ${(s.current_rate*100).toFixed(1)}%
        </div>
        <div class="stat-label">${s.slo_name.replace(/_/g,' ')}</div>
        <div style="font-size:10px;color:#8b949e;margin-top:4px">target ${(s.target*100).toFixed(0)}%</div>
      </div>
    `).join('');
  } catch {}
}

document.getElementById('new-session-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const task = document.getElementById('task-input').value.trim();
  if (!task) return;
  const status = document.getElementById('submit-status');
  status.textContent = 'Submitting…';
  const r = await fetch('/api/v1/sessions', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({task_description: task}),
  });
  if (r.ok) {
    const data = await r.json();
    status.textContent = `Session created: ${data.session_id}`;
    document.getElementById('task-input').value = '';
    setTimeout(loadSessions, 1000);
  } else {
    status.textContent = 'Error submitting session.';
  }
});

loadSessions();
loadSLOs();
setInterval(loadSessions, 10000);
</script>
{% endblock %}
