{% extends "base.html" %}
{% block title %}Replay — {{ session_id[:8] }} — gemini-runtime{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
  <a href="/sessions/{{ session_id }}">← trace</a>
  <h1 style="margin:0">Replay <span class="mono">{{ session_id }}</span></h1>
</div>

<div class="card" style="margin-bottom:16px">
  <div style="display:flex;gap:12px;align-items:center">
    <button id="btn-play" onclick="play()"
      style="background:#1f6feb;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-family:inherit">
      ▶ Play
    </button>
    <button id="btn-pause" onclick="pause()" disabled
      style="background:#21262d;color:#8b949e;border:1px solid #30363d;padding:8px 20px;border-radius:6px;cursor:pointer;font-family:inherit">
      ⏸ Pause
    </button>
    <label style="font-size:12px;color:#8b949e">
      Speed:
      <select id="speed" style="background:#161b22;color:#e6edf3;border:1px solid #30363d;border-radius:4px;padding:4px 8px;font-family:inherit">
        <option value="200">0.5×</option>
        <option value="100" selected>1×</option>
        <option value="50">2×</option>
        <option value="10">10×</option>
      </select>
    </label>
    <span id="progress" style="font-size:12px;color:#8b949e;margin-left:auto">0 / 0 events</span>
  </div>
</div>

<div class="grid2">
  <div class="card">
    <h2>Event stream</h2>
    <div id="event-log" style="height:480px;overflow-y:auto;font-size:12px"></div>
  </div>
  <div class="card">
    <h2>Live stats</h2>
    <div class="grid2" style="gap:12px" id="live-stats">
      <div><div class="stat-value" id="stat-tokens">0</div><div class="stat-label">Tokens</div></div>
      <div><div class="stat-value" id="stat-cost">$0.00000</div><div class="stat-label">Cost</div></div>
      <div><div class="stat-value" id="stat-calls">0</div><div class="stat-label">Tool Calls</div></div>
      <div><div class="stat-value" id="stat-errors">0</div><div class="stat-label">Errors</div></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const SESSION_ID = "{{ session_id }}";
let events = [], idx = 0, timer = null;
let tokens = 0, cost = 0, calls = 0, errors = 0;

const roleColor = {planner:'#58a6ff',researcher:'#3fb950',executor:'#e3b341',verifier:'#f78166'};
const eventIcon = {tool_call_finished:'✓',tool_call_failed:'✗',agent_handoff:'→',session_completed:'■'};

async function loadEvents() {
  const r = await fetch(`/api/v1/sessions/${SESSION_ID}/replay`);
  events = await r.json();
  document.getElementById('progress').textContent = `0 / ${events.length} events`;
}

function renderEvent(ev) {
  const log = document.getElementById('event-log');
  const icon = eventIcon[ev.event_type] || '•';
  const color = roleColor[ev.agent_role] || '#8b949e';
  const time = new Date(ev.emitted_at).toLocaleTimeString();
  const line = document.createElement('div');
  line.style.cssText = `display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #21262d`;
  line.innerHTML = `
    <span style="color:${color};min-width:80px">${ev.agent_role}</span>
    <span>${icon}</span>
    <span style="color:#e6edf3">${ev.event_type}</span>
    <span style="color:#8b949e;margin-left:auto">${time}</span>
  `;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;

  // update stats
  if (ev.event_type === 'tool_call_finished') { calls++; cost += ev.cost_usd||0; tokens += ev.completion_tokens||0; }
  if (ev.event_type === 'tool_call_failed') { errors++; }
  document.getElementById('stat-tokens').textContent = tokens.toLocaleString();
  document.getElementById('stat-cost').textContent = `$${cost.toFixed(5)}`;
  document.getElementById('stat-calls').textContent = calls;
  document.getElementById('stat-errors').textContent = errors;
  document.getElementById('progress').textContent = `${idx} / ${events.length} events`;
}

function play() {
  if (idx >= events.length) { idx = 0; document.getElementById('event-log').innerHTML = ''; tokens=cost=calls=errors=0; }
  document.getElementById('btn-play').disabled = true;
  document.getElementById('btn-pause').disabled = false;
  step();
}

function step() {
  if (idx >= events.length) { pause(); return; }
  renderEvent(events[idx++]);
  const speed = parseInt(document.getElementById('speed').value, 10);
  timer = setTimeout(step, speed);
}

function pause() {
  clearTimeout(timer);
  document.getElementById('btn-play').disabled = false;
  document.getElementById('btn-pause').disabled = true;
}

loadEvents();
</script>
{% endblock %}
